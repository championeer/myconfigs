# ==========================================
# Jason's Optimized Tmux Config (2026 Ready)
# ==========================================

# --- 核心基础 (Core) ---
#set -g prefix C-a
set -g prefix `
unbind C-b
bind ` send-prefix

# 极速响应（解决 Vim 模式切换延迟）
set -g escape-time 0
set -g history-limit 100000
set -g mouse on

# 索引从1开始（符合键盘物理排列）
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# 快速重载配置 (Prefix + r)
bind r source-file ~/.tmux.conf \; display "Config Reloaded!"

# --- 颜色与渲染 (Display & Colors) ---
# 强制开启真彩支持，适配 Ghostty, Warp, Alacritty 等现代终端
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:Tc"
set -as terminal-overrides ",*:RGB"

# --- 窗口与面板管理 (Navigation) ---
# 更加直观的分屏快捷键 (保留当前路径)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Vim 风格面板切换
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Vim 风格面板调整 (大写 HJKL)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 5

# 布局管理
bind Space next-layout
bind m select-layout main-vertical
bind M select-layout main-horizontal
bind -r s choose-tree -Zw  # 增强版会话树

# --- 复制模式与剪贴板 (Copy Mode & Clipboard) ---
setw -g mode-keys vi
bind [ copy-mode
bind ] paste-buffer

# 允许终端应用程序设置剪贴板 (OSC 52)，对 Ghostty/iTerm2 友好
set -g set-clipboard on

# 智能判断 OS 实现系统级复制 (兼容 macOS 和 Linux)
# macOS
if-shell "uname | grep -q Darwin" \
  "bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy'"

# Linux (X11)
if-shell "type xclip" \
  "bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -selection clipboard -in'"

# Linux (Wayland)
if-shell "type wl-copy" \
  "bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'wl-copy'"

# --- 状态栏 (Status Bar) ---
set -g status-interval 2
set -g status-position bottom
set -g status-style "bg=default,fg=white" # 背景透明化，适应 Ghostty 主题

# 左侧：Session名
set -g status-left-length 50
set -g status-left "#[fg=green,bold] #S #[fg=colour238]|"

# 中间：窗口列表
# 修正：自动重命名开启，但仅显示命令名，不显示冗长路径
set -g allow-rename on
set -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_command}'

set -g window-status-format " #I:#W "
set -g window-status-current-format "#[fg=blue,bold] #I:#W #[default]"

# 右侧：时间
set -g status-right "#[fg=yellow] %H:%M "

# Prefix + g 弹出一个浮动的 lazygit 或 htop 窗口（如果没有 lazygit 改为 htop）
bind g display-popup -d '#{pane_current_path}' -w80% -h80% -E "lazygit || htop"

# --- TPM 插件管理 (Plugins) ---
# 保持你原有的插件配置
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# 1. 引入 Resurrect (核心保存机制)
set -g @plugin 'tmux-plugins/tmux-resurrect'
# 2. 引入 Continuum (自动保存与自动恢复)
set -g @plugin 'tmux-plugins/tmux-continuum'

# --- Resurrect 配置 (针对 Vim/Neovim) ---
# 核心原理：Tmux 只能恢复 vim 进程，无法知道 vim 内部打开了什么文件。
# 此配置告诉 Tmux：恢复 vim 时，去读取 vim 目录下的 Session.vim 文件。
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session' # 如果你用 Neovim
set -g @resurrect-capture-pane-contents 'on'

# --- Continuum 配置 (自动化) ---
# 开启自动恢复 (Tmux server 启动时自动加载上次保存的环境)
set -g @continuum-restore 'on'
# 设置自动保存间隔 (单位：分钟，默认 15)
set -g @continuum-save-interval '45'

# --- 主题插件 ---
set -g @plugin 'catppuccin/tmux'

# --- 主题详细配置 ---
# 推荐使用 Mocha (深色) 或 Latte (浅色)
set -g @catppuccin_flavour 'mocha'

# 状态栏位置 (推荐 top，符合 Ghostty 风格)
set -g status-position top

# 窗口列表显示风格 (圆角 icon 风格)
set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_right_separator " "
set -g @catppuccin_window_middle_separator " █"
set -g @catppuccin_window_number_position "right"

# 窗口状态显示内容
set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#W"

# 右侧模块 (显示目录、用户、主机等，可按需删减)
set -g @catppuccin_status_modules_right "directory user host session"
set -g @catppuccin_status_left_separator  " "
set -g @catppuccin_status_right_separator ""
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"

# 初始化 TPM (必须放在最后)
run '~/.tmux/plugins/tpm/tpm'
